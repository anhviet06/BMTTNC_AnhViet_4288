<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Bảo Mật | Viet4288</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 90%;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.15);
            color: #4361ee;
        }

        h1 {
            font-weight: 700;
            color: #2b2d42;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .btn-menu {
            background: #4361ee;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px 30px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
        }

        .btn-menu:hover {
            transform: scale(1.05);
            background: #3751d4;
            color: white;
            box-shadow: 0 15px 30px rgba(67, 97, 238, 0.3);
        }

        .footer-tag {
            position: absolute;
            bottom: 20px;
            color: #8d99ae;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="menu-card animate__animated animate__zoomIn">
    <div class="logo-box">
        <i data-lucide="layers" size="40"></i>
    </div>
    
    <h1>MENU CHÍNH</h1>
    <p class="subtitle">Chào mừng bạn đến với hệ thống mã hóa bảo mật Viet4288</p>

    <div class="d-grid">
        <a href="/playfair" class="btn-menu">
            <i data-lucide="shield-check"></i>
            Mã hóa Playfair
        </a>
    </div>
    
</div>

<div class="footer-tag">
    LAB-02 | Học viên: AnhViet_4288
</div>

<script>
    // Khởi tạo icon
    lucide.createIcons();
</script>

</body>
</html>
